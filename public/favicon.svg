<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="c">
      <rect width="512" height="256"/>
    </clipPath>
  </defs>
  <!-- Outer circle -->
  <circle cx="256" cy="256" r="246" fill="#dc0a2d" stroke="#8b0000" stroke-width="8"/>
  <!-- Center dividing line -->
  <rect x="10" y="248" width="492" height="16" fill="#333"/>
  <rect x="10" y="248" width="180" height="16" fill="#8b0000"/>
  <!-- Top half highlight -->
  <circle cx="256" cy="256" r="245" fill="none" stroke="#dc0a2d" stroke-width="2" clip-path="url(#c)"/>
  <!-- Inner white ring -->
  <circle cx="256" cy="256" r="100" fill="white" stroke="#333" stroke-width="8"/>
  <!-- Center button -->
  <circle cx="256" cy="256" r="38" fill="white" stroke="#333" stroke-width="5"/>
  <circle cx="256" cy="256" r="22" fill="#dc0a2d"/>
  <circle cx="256" cy="256" r="22" fill="none" stroke="#8b0000" stroke-width="2"/>
</svg>
